<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>D3.js scatter plot with hover</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <style>
        #tooltip {
            position: absolute;
            text-align: center;
            width: 120px;       
            height: auto;      
            padding: 8px;
            font: 12px sans-serif;
            background: white;
            border: 0px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
        }

        svg {
            display: block;
        }

        .axis-label {
            fill: #000;
            font-size: 12px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    
    <script>
        // 設定 SVG 大小
        var margin = {top: 20, right: 30, bottom: 50, left: 60},
            width = 1080 - margin.left - margin.right,
            height = 580 - margin.top - margin.bottom;

        // 加入 svg 到 body
        d3.select("body").style("margin", "0");

        var svg = d3.select("body").append("svg")
            .attr("width", "100%")  // 使用百分比讓它填滿 iframe
            .attr("viewBox", "0 0 " + (width + margin.left + margin.right) + " " + (height + margin.top + margin.bottom))
            .append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
        
        var tooltip = d3.select("body").append("div")
            .attr("id", "tooltip")
            .style("opacity", 0);

        // ★ 必殺技：只設定你的純學號，用來做模糊比對
        var myTargetID = "110590455";
        
        d3.csv("results.csv").then(function(data) {

            // 設定x軸比例尺
            var x = d3.scaleLinear()
                .domain([0.3, 1]) // ssim
                .range([ 0, width ]);

            // 畫 X 軸
            svg.append("g")
                .attr("transform", "translate(0," + height + ")")
                .call(d3.axisBottom(x))
                .append("text")
                .attr("class", "axis-label")
                .attr("x", width) 
                .attr("y", -40) 
                .style("text-anchor", "end")
                .text("SSIM");

            // 設定y軸比例尺
            var y = d3.scaleLinear()
                .domain([0, 0.7]) // lpips
                .range([ height, 0]);

            // 加入Y軸以及標籤
            svg.append("g")
                .call(d3.axisLeft(y))
                .append("text")
                .attr("class", "axis-label")
                .attr("transform", "rotate(-90)") 
                .attr("y", 30) 
                .attr("dy", ".71em") 
                .style("text-anchor", "end") 
                .text("LPIPS");

            var filteredData = data.filter(function(d) {
                return d.SSIM >= 0 && d.SSIM <=1 && d.LPIPS >=0 && d.LPIPS <= 1;
            });

            var node = svg.append('g')
                .selectAll("g.node")
                .data(filteredData)
                .enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", function(d) { return "translate(" + x(d.SSIM) + "," + y(d.LPIPS) + ")"; })
                .style("cursor", "pointer");

            // 畫正方形
            var rectSize = 36; 
            node.append("rect")
                .attr("width", rectSize)
                .attr("height", rectSize)
                .attr("x", -rectSize / 2) 
                .attr("y", -rectSize / 2) 
                .style("fill", "rgba(0,0,0,0)") 
                .style("stroke", function(d) {
                    // ★ 終極解法：只要 CSV 裡面的資料「包含」你的學號，就直接上紅色！
                    if (d.Student && d.Student.includes(myTargetID)) {
                        return "red";
                    } else {
                        return "#187C19";
                    }
                })
                .style("stroke-width", function(d) {
                    // 包含你學號的框框加粗成 4px
                    if (d.Student && d.Student.includes(myTargetID)) {
                        return "4px";
                    } else {
                        return "1.5px";
                    }
                });

            // 加入圖片
            node.append("image")
                .attr("xlink:href", function(d) { 
                    return "img/" + d.Student; 
                }) 
                .attr("x", -17)
                .attr("y", -17) 
                .attr("width", 34) 
                .attr("height", 34)
                .style("pointer-events", "none");

            // Tooltip 綁定到整個 node 群組上
            node.on("mouseover", function(d) {
                    tooltip.transition()
                        .duration(200)
                        .style("opacity", .9);
                    
                    // 順便讓滑鼠移到你自己那格時，浮出視窗的學號也變成紅色
                    var nameColor = (d.Student && d.Student.includes(myTargetID)) ? "red" : "black";

                    tooltip.html(
                        "<div style='margin-bottom:5px; font-weight:bold; font-size: 1.1em; color:" + nameColor + ";'>" + d.Student + "</div>" +
                        "<img src='img/" + d.Student + "' alt='Handwriting' style='width: 100%; height: auto; border: 1px solid #ccc;'>"
                    )
                    var tooltipNode = document.getElementById("tooltip");
                    var tooltipWidth = tooltipNode.offsetWidth;
                    var tooltipHeight = tooltipNode.offsetHeight;

                    tooltip
                        .style("left", (d3.event.pageX - tooltipWidth - 8) + "px") 
                        .style("top", (d3.event.pageY - tooltipHeight - 8) + "px"); 
                })
                .on("mouseout", function(d) {
                    tooltip.transition()
                        .duration(500)
                        .style("opacity", 0);
                });
            
        });

    </script>
</body>
</html>
